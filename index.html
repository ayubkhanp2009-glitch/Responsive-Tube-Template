const videosPerPage = 4;
let currentPage = 1;

function displayVideos(page) {
    currentPage = page;
    const start = (page - 1) * videosPerPage;
    const end = start + videosPerPage;
    const videosToShow = allVideos.slice(start, end);

    let html = '<ul>';
    videosToShow.forEach(video => {
        html += `
            <li>
                <div class="thumb">
                    <div class="thumb-content">
                        <a href="${video.link}" target="_blank" rel="noopener">
                            <img src="${video.thumb}" alt="">
                            <span class="duration">${video.duration}</span>
                        </a>
                    </div>
                    <div class="thumb-header" style="height: 45px;">
                        <h3>${video.title}</h3>
                    </div>
                    <div class="thumb-footer">
                        <span class="views"><i class="fa fa-eye"></i> 1.2M</span>
                        <span class="like"><i class="fa fa-thumbs-o-up"></i> 90%</span>
                    </div>
                </div>
            </li>`;
    });
    html += '</ul>';
    document.getElementById('video-grid').innerHTML = html;

    renderPagination();
}

function renderPagination() {
    const totalPages = Math.ceil(allVideos.length / videosPerPage);
    let html = `
        <li><a onclick="displayVideos(${Math.max(1, currentPage-1)})" class="prev"><i class="fa fa-chevron-left"></i> Prev</a></li>`;

    for(let i = 1; i <= totalPages; i++) {
        html += `<li ${i === currentPage ? 'class="active"' : ''}><a onclick="displayVideos(${i})">${i}</a></li>`;
    }

    html += `<li><a onclick="displayVideos(${Math.min(totalPages, currentPage+1)})" class="next">Next <i class="fa fa-chevron-right"></i></a></li>`;
    document.getElementById('pagination').innerHTML = html;
}
